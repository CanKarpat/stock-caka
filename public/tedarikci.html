<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tedarikçiler — Abiye Stok</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f5;--surface:#fff;--surface2:#f1efe9;--border:#e0ddd6;--border-strong:#c8c4bc;
  --text:#1a1a18;--text-sec:#6b6860;--text-muted:#9e9b94;
  --accent:#4f6ef7;--accent-bg:#eef1fe;--accent-text:#2d49c4;
  --success-bg:#eaf3de;--success-text:#3b6d11;
  --warning-bg:#faeeda;--warning-text:#854f0b;
  --input-border:#8b5cf6;--input-border-focus:#ffffff;
  --radius:8px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#181816;--surface:#242422;--surface2:#2e2e2b;--border:#3a3a36;--border-strong:#4e4e4a;
  --text:#f0ede6;--text-sec:#a09d96;--text-muted:#6b6860;
  --accent:#6b87ff;--accent-bg:#1a2040;--accent-text:#a0b0ff;
  --success-bg:#172510;--success-text:#7acc44;
  --warning-bg:#2a1e08;--warning-text:#f0b060;
}}
:root[data-theme="light"]{
  --bg:#f8f7f5;--surface:#fff;--surface2:#f1efe9;--border:#e0ddd6;--border-strong:#c8c4bc;
  --text:#1a1a18;--text-sec:#6b6860;--text-muted:#9e9b94;
  --accent:#4f6ef7;--accent-bg:#eef1fe;--accent-text:#2d49c4;
  --success-bg:#eaf3de;--success-text:#3b6d11;
  --warning-bg:#faeeda;--warning-text:#854f0b;
}
:root[data-theme="dark"]{
  --bg:#181816;--surface:#242422;--surface2:#2e2e2b;--border:#3a3a36;--border-strong:#4e4e4a;
  --text:#f0ede6;--text-sec:#a09d96;--text-muted:#6b6860;
  --accent:#6b87ff;--accent-bg:#1a2040;--accent-text:#a0b0ff;
  --success-bg:#172510;--success-text:#7acc44;
  --warning-bg:#2a1e08;--warning-text:#f0b060;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;min-height:54px;display:flex;flex-wrap:wrap;align-items:center;gap:8px 10px;position:sticky;top:0;z-index:20}
header h1{font-size:15px;font-weight:600;flex:1 1 auto;min-width:140px}
.btn{height:30px;padding:0 12px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:11px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:5px;text-decoration:none;white-space:nowrap;transition:background .12s}
.btn:hover{background:var(--surface2)}

.layout{display:flex;max-width:1400px;margin:0 auto;min-height:calc(100vh - 54px)}

.sidebar{width:250px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface);padding:14px 10px;display:flex;flex-direction:column;gap:10px}
.sidebar input{height:34px;padding:0 10px;border:1px solid var(--input-border);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-size:13px}
.sidebar input:focus{outline:none;border-color:var(--input-border-focus)}
.ted-list{display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.ted-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--text-sec)}
.ted-item:hover{background:var(--surface2)}
.ted-item.active{background:var(--accent-bg);color:var(--accent-text);font-weight:600}
.ted-item .count{font-size:11px;background:var(--surface2);color:var(--text-muted);padding:1px 7px;border-radius:10px}
.ted-item.active .count{background:var(--surface);color:var(--accent-text)}

.main{flex:1;padding:16px 20px;min-width:0}
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px}
.scard-label{font-size:11px;color:var(--text-muted);margin-bottom:3px}
.scard-value{font-size:19px;font-weight:600}

.table-wrap{overflow-x:auto;background:var(--surface);border:1px solid var(--border);border-radius:10px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--surface2)}
th{padding:8px 10px;text-align:left;font-weight:600;font-size:11px;color:var(--text-sec);border-bottom:1px solid var(--border);white-space:nowrap;text-transform:uppercase;letter-spacing:.3px}
th.r,td.r{text-align:right}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:9px;white-space:nowrap}
.badge-yayinda{background:var(--success-bg);color:var(--success-text)}
.badge-beklemede{background:var(--warning-bg);color:var(--warning-text)}
.badge-pasif{background:var(--surface2);color:var(--text-muted)}
.empty-state{text-align:center;padding:48px 20px;color:var(--text-muted)}

@media(max-width:760px){
  .layout{flex-direction:column}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border)}
  .ted-list{max-height:180px}
}
@media(max-width:600px){
  /* iOS Safari, odaklanan input/select'in font-size'ı 16px'in altındaysa sayfayı otomatik yakınlaştırır */
  input,select,textarea{font-size:16px!important}
}
</style>
<script>
(function(){
  var saved = localStorage.getItem('theme');
  if (saved === 'light' || saved === 'dark') document.documentElement.setAttribute('data-theme', saved);
  window.toggleTheme = function(){
    var current = document.documentElement.getAttribute('data-theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    var next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateThemeIcon();
  };
  window.updateThemeIcon = function(){
    var icon = document.getElementById('theme-icon');
    if (!icon) return;
    var current = document.documentElement.getAttribute('data-theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    icon.innerHTML = current === 'dark'
      ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
      : '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
  };
  document.addEventListener('DOMContentLoaded', updateThemeIcon);
})();
</script>
</head>
<body>

<header>
  <a href="/" class="btn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Stok Listesi
  </a>
  <h1>Tedarikçiler</h1>
  <a href="barkodlar.html" class="btn">Barkodlar</a>
  <a href="beden.html" class="btn">Beden Tablosu</a>
  <button class="btn" id="theme-toggle" style="width:30px;padding:0;justify-content:center" onclick="toggleTheme()" title="Görünüm modu (açık/koyu)">
    <svg id="theme-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"></svg>
  </button>
</header>

<div class="layout">
  <div class="sidebar">
    <input type="text" id="ted-search" placeholder="Tedarikçi ara...">
    <div class="ted-list" id="ted-list"></div>
  </div>
  <div class="main" id="main">
    <div class="empty-state">Yükleniyor...</div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey:"AIzaSyBED4SOH13mpdpuGLHwG_wl6lhe1a4YNos",
  authDomain:"stok-19117.firebaseapp.com",
  projectId:"stok-19117",
  storageBucket:"stok-19117.firebasestorage.app",
  messagingSenderId:"599549832875",
  appId:"1:599549832875:web:4570ade50e2731469091ee"
});
const db = getFirestore(app);

const TEDARIKCISIZ = '— Tedarikçisi belirtilmemiş —';
let products = [];
let activeTedarikci = null;
let sidebarSearch = '';

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
const fmtN = n => Number(n||0).toLocaleString('tr-TR');
const fmt = n => Number(n||0).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2});
const totalMiktar = p => (p.variants||[]).reduce((s,v)=>s+Number(v.miktar||0),0);
const totalDeger = p => (p.variants||[]).reduce((s,v)=>s+Number(v.miktar||0)*Number(p.alis||0),0);
const totalCiro = p => (p.variants||[]).reduce((s,v)=>s+Number(v.miktar||0)*Number(p.satis||0),0);

function groupByTedarikci(){
  const map = new Map();
  products.forEach(p=>{
    const key = (p.tedarikci||'').trim() || TEDARIKCISIZ;
    if(!map.has(key)) map.set(key, []);
    map.get(key).push(p);
  });
  return map;
}

onSnapshot(collection(db,'stok'), snap => {
  products = snap.docs.map(d=>({id:d.id,...d.data()}));
  products.sort((a,b)=>(a.sira||0)-(b.sira||0));
  if(!activeTedarikci){
    const map = groupByTedarikci();
    const first = [...map.keys()].sort((a,b)=>a===TEDARIKCISIZ?1:b===TEDARIKCISIZ?-1:a.localeCompare(b,'tr'))[0];
    activeTedarikci = first || null;
  }
  render();
}, () => {
  document.getElementById('main').innerHTML = '<div class="empty-state">Bağlantı kurulamadı.</div>';
});

document.getElementById('ted-search').addEventListener('input', e=>{ sidebarSearch = e.target.value.toLowerCase(); renderSidebar(); });

function renderSidebar(){
  const map = groupByTedarikci();
  let names = [...map.keys()].sort((a,b)=>a===TEDARIKCISIZ?1:b===TEDARIKCISIZ?-1:a.localeCompare(b,'tr'));
  if(sidebarSearch) names = names.filter(n=>n.toLowerCase().includes(sidebarSearch));
  document.getElementById('ted-list').innerHTML = names.length ? names.map(n=>`
    <div class="ted-item ${n===activeTedarikci?'active':''}" onclick="selectTedarikci('${esc(n).replace(/'/g,"\\'")}')">
      <span>${esc(n)}</span>
      <span class="count">${map.get(n).length}</span>
    </div>`).join('') : '<div style="padding:10px;color:var(--text-muted);font-size:12px">Sonuç yok</div>';
}

window.selectTedarikci = function(name){
  activeTedarikci = name;
  render();
};

window.editInStokListesi = function(kod){
  localStorage.setItem('pendingSearch', kod);
  window.location.href = 'index.html';
};

function render(){
  renderSidebar();
  const map = groupByTedarikci();
  const list = map.get(activeTedarikci) || [];

  if(!products.length){
    document.getElementById('main').innerHTML = '<div class="empty-state">Henüz ürün eklenmemiş.</div>';
    return;
  }

  const anaCount = list.length;
  const varCount = list.reduce((s,p)=>s+(p.variants||[]).length,0);
  const totalQ = list.reduce((s,p)=>s+totalMiktar(p),0);
  const totalM = list.reduce((s,p)=>s+totalDeger(p),0);
  const totalC = list.reduce((s,p)=>s+totalCiro(p),0);

  const rows = list.map(p=>{
    const durumClass = p.durum==='Yayında'?'badge-yayinda':p.durum==='Beklemede'?'badge-beklemede':'badge-pasif';
    const bedenler = [...new Set((p.variants||[]).map(v=>v.beden).filter(Boolean))].join(', ');
    return `<tr>
      <td><span style="font-family:monospace;font-size:12px;font-weight:600">${esc(p.kod)}</span></td>
      <td>${esc(p.ad||'—')}</td>
      <td><span class="badge ${durumClass}">${esc(p.durum||'Yayında')}</span></td>
      <td style="font-size:12px;color:var(--text-sec)">${esc(bedenler||'—')}</td>
      <td class="r">${(p.variants||[]).length}</td>
      <td class="r fw">${fmtN(totalMiktar(p))}</td>
      <td class="r">₺${fmt(totalDeger(p))}</td>
      <td class="r">₺${fmt(totalCiro(p))}</td>
      <td><button class="btn" onclick="editInStokListesi('${esc(p.kod).replace(/'/g,"\\'")}')">Düzenle</button></td>
    </tr>`;
  }).join('');

  document.getElementById('main').innerHTML = `
    <div class="summary">
      <div class="scard"><div class="scard-label">Ürün / Varyant</div><div class="scard-value">${anaCount} / ${varCount}</div></div>
      <div class="scard"><div class="scard-label">Toplam Adet</div><div class="scard-value">${fmtN(totalQ)}</div></div>
      <div class="scard"><div class="scard-label">Maliyet Değeri</div><div class="scard-value">₺${fmtN(Math.round(totalM))}</div></div>
      <div class="scard"><div class="scard-label">Potansiyel Ciro</div><div class="scard-value">₺${fmtN(Math.round(totalC))}</div></div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>SKU</th><th>Ürün Adı</th><th>Durum</th><th>Bedenler</th>
          <th class="r">Varyant</th><th class="r">Adet</th><th class="r">Maliyet</th><th class="r">Ciro</th><th></th>
        </tr></thead>
        <tbody>${rows || `<tr><td colspan="9" class="empty-state">Bu tedarikçiye ait ürün yok</td></tr>`}</tbody>
      </table>
    </div>`;
}
</script>
</body>
</html>
