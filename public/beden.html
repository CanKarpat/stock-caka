<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f5;--surface:#fff;--surface2:#f1efe9;--border:#e0ddd6;--border-strong:#c8c4bc;
  --text:#1a1a18;--text-sec:#6b6860;--text-muted:#9e9b94;
  --accent:#4f6ef7;--accent-bg:#eef1fe;--accent-text:#2d49c4;
  --input-border:#8b5cf6;--input-border-focus:#ffffff;
  --radius:8px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#181816;--surface:#242422;--surface2:#2e2e2b;--border:#3a3a36;
  --text:#f0ede6;--text-sec:#a09d96;--text-muted:#6b6860;
  --accent:#6b87ff;--accent-bg:#1a2040;--accent-text:#a0b0ff;
}}
:root[data-theme="light"]{
  --bg:#f8f7f5;--surface:#fff;--surface2:#f1efe9;--border:#e0ddd6;--border-strong:#c8c4bc;
  --text:#1a1a18;--text-sec:#6b6860;--text-muted:#9e9b94;
  --accent:#4f6ef7;--accent-bg:#eef1fe;--accent-text:#2d49c4;
}
:root[data-theme="dark"]{
  --bg:#181816;--surface:#242422;--surface2:#2e2e2b;--border:#3a3a36;
  --text:#f0ede6;--text-sec:#a09d96;--text-muted:#6b6860;
  --accent:#6b87ff;--accent-bg:#1a2040;--accent-text:#a0b0ff;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;min-height:54px;display:flex;flex-wrap:wrap;align-items:center;gap:8px 10px;position:sticky;top:0;z-index:10}
header h1{font-size:15px;font-weight:600;flex:1 1 auto;min-width:140px}
.btn{height:34px;padding:0 12px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:5px;text-decoration:none;transition:background .12s}
.btn:hover{background:var(--surface2)}
.container{max-width:1100px;margin:0 auto;padding:16px}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-muted);width:15px;height:15px;pointer-events:none}
.search-wrap input{width:100%;height:36px;padding:0 10px 0 30px;border:1px solid var(--input-border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:13px}
.search-wrap input:focus{outline:none;border-color:var(--input-border-focus)}
[id^="br-start-"]:focus,[id^="br-end-"]:focus,[id^="br-list-"]:focus{outline:none;border-color:var(--input-border-focus)}

.product-block{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden}
.product-block.selected{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.urun-tabs{display:flex;gap:6px;margin-bottom:14px}
.urun-tab{height:34px;padding:0 14px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);color:var(--text-sec);font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
.urun-tab:hover{background:var(--surface2)}
.urun-tab.active{background:var(--accent);color:#fff;border-color:transparent}
.urun-tab .tab-count{font-weight:500;opacity:.8}
.product-header{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:var(--surface2)}
.product-header .sku{font-family:monospace;font-size:12px;font-weight:700;color:var(--accent-text);background:var(--accent-bg);padding:2px 8px;border-radius:6px}
.product-header .ad{font-size:14px;font-weight:500;flex:1}
.beden-table{width:100%;border-collapse:collapse}
.beden-table th{padding:8px 8px;font-size:11px;font-weight:700;color:var(--text-sec);text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border);background:var(--surface);text-align:left}
.beden-table th.r{text-align:right}
.beden-table td{padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
.beden-table tr:last-child td{border-bottom:none}
.beden-table tr:hover td{background:var(--surface2)}
.beden-table td.r{text-align:right}
.beden-table input{width:70px;border:1px solid var(--input-border);border-radius:5px;padding:4px 6px;font-size:13px;text-align:right;background:transparent;color:var(--text);font-family:inherit}
.beden-table input:hover{border-color:var(--input-border);background:var(--surface2)}
.beden-table input:focus{border-color:var(--input-border-focus);background:var(--surface);outline:none;box-shadow:0 0 0 2px var(--accent-bg)}
.beden-num{font-size:16px;font-weight:700;color:var(--text)}
.color-dot{display:inline-block;width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,.15);vertical-align:middle}
.renk-wrap{display:flex;align-items:center;gap:3px;flex-wrap:wrap}
.empty{text-align:center;padding:60px;color:var(--text-muted)}
.sync-badge{font-size:11px;padding:3px 8px;border-radius:20px}
.sync-badge.online{background:#eaf3de;color:#3b6d11}
.sync-badge.offline{background:#fcebeb;color:#a32d2d}

@media print{
  header .btn, .toolbar{display:none}
  .product-block{break-inside:avoid;margin-bottom:8px}
  body{font-size:12px}
}
@media(max-width:600px){
  /* iOS Safari, odaklanan input/select'in font-size'ı 16px'in altındaysa sayfayı otomatik yakınlaştırır */
  input,select,textarea{font-size:16px!important}
}
</style>
<script>
(function(){
  var saved = localStorage.getItem('theme');
  if (saved === 'light' || saved === 'dark') document.documentElement.setAttribute('data-theme', saved);
  window.toggleTheme = function(){
    var current = document.documentElement.getAttribute('data-theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    var next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateThemeIcon();
  };
  window.updateThemeIcon = function(){
    var icon = document.getElementById('theme-icon');
    if (!icon) return;
    var current = document.documentElement.getAttribute('data-theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    icon.innerHTML = current === 'dark'
      ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
      : '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
  };
  document.addEventListener('DOMContentLoaded', updateThemeIcon);
})();
</script>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, onSnapshot, doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey:"AIzaSyBED4SOH13mpdpuGLHwG_wl6lhe1a4YNos",
  authDomain:"stok-19117.firebaseapp.com",
  projectId:"stok-19117",
  storageBucket:"stok-19117.firebasestorage.app",
  messagingSenderId:"599549832875",
  appId:"1:599549832875:web:4570ade50e2731469091ee"
});
const db = getFirestore(app);

const CMAP={Siyah:'#1a1a1a',Ekru:'#f5f0e0',Bordo:'#7b1e34',Lacivert:'#1a2a5e',Pudra:'#f2c4ce',
  'Yeşil':'#4a7c59',Mor:'#5b3d8a','Kırmızı':'#c0392b','Altın':'#c9a84c','Gümüş':'#a8a9ad',
  Mavi:'#2e6fb4',Bej:'#d4b896',Beyaz:'#f8f8f8',Pembe:'#f4a7b9',Kahverengi:'#7b5533'};
const BEDEN_ORDER=['32','34','36','38','40','42','44','46','48','50'];

let products=[];
let search='';
let productTab='eslesmis'; // 'eslesmis' = İKAS'ta aktif/eşleşmiş, 'yeni' = henüz eşleşmemiş
let selected=new Set(); // dışa aktarım için elle seçilen ürün id'leri

const setSyncStatus=s=>{const b=document.getElementById('sync-badge');b.className='sync-badge '+s;b.textContent=s==='online'?'● Canlı':'○ Çevrimdışı';};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');

// ── Odak koruma + Enter ile sıradaki satıra geçiş ──────────────────
function buildFocusSelector(el){
  const attrs=[...el.attributes].filter(a=>a.name.startsWith('data-'));
  if(!attrs.length) return null;
  return el.tagName.toLowerCase()+attrs.map(a=>`[${a.name}="${CSS.escape(a.value)}"]`).join('');
}
function captureFocus(){
  const el=document.activeElement;
  if(!el||el.tagName!=='INPUT') return null;
  const selector=buildFocusSelector(el);
  if(!selector) return null;
  return {selector, selStart:el.selectionStart, selEnd:el.selectionEnd};
}
function restoreFocus(snap){
  if(!snap) return;
  const el=document.querySelector(snap.selector);
  if(!el) return;
  el.focus();
  if(typeof snap.selStart==='number' && el.setSelectionRange){ try{el.setSelectionRange(snap.selStart,snap.selEnd);}catch(e){} }
}
document.addEventListener('keydown', e=>{
  if(e.key==='Enter' && e.target && e.target.matches('input[data-field]')){
    e.preventDefault();
    const field=e.target.getAttribute('data-field');
    const cells=[...document.querySelectorAll(`input[data-field="${CSS.escape(field)}"]`)];
    const idx=cells.indexOf(e.target);
    const next=cells[idx+(e.shiftKey?-1:1)];
    if(next){ next.focus(); next.select(); }
  }
});

onSnapshot(collection(db,'stok'),snap=>{
  products=snap.docs.map(d=>({id:d.id,...d.data()}));
  products.sort((a,b)=>(a.sira||0)-(b.sira||0));
  setSyncStatus('online');
  render();
},()=>setSyncStatus('offline'));

async function saveProduct(p){
  const {id,...data}=p;
  await setDoc(doc(db,'stok',String(id)),{...data,ts:serverTimestamp()});
}

document.getElementById('search').addEventListener('input',e=>{search=e.target.value.toLowerCase();render();});

window.updBedenOlcu=async function(pid,beden,field,val){
  const p=products.find(x=>x.id===pid);if(!p)return;
  const num=parseFloat(val)||0;
  (p.variants||[]).filter(v=>v.beden===beden).forEach(v=>{v[field]=num;});
  await saveProduct(p);
};

const uid=()=>String(Date.now())+Math.random().toString(36).slice(2,6);

// Ortak: verilen beden listesi için mevcut renklerin her biriyle eksik varyantları oluştur
function buildMissingSizeVariants(p, sizes){
  const vars = p.variants||[];
  const renkler = [...new Set(vars.map(v=>v.renk))];
  const colors = renkler.length ? renkler : ['Siyah'];
  const existing = new Set(vars.map(v=>v.renk+'|'+v.beden));
  const yeni = [];
  colors.forEach(renk=>{
    sizes.forEach(beden=>{
      if(!beden || existing.has(renk+'|'+beden)) return;
      existing.add(renk+'|'+beden);
      yeni.push({id:uid(), sku:p.kod+'-V'+(vars.length+yeni.length+1), renk, beden, miktar:0, barkod:'', gogus:0, bel:0, basen:0, boy:0});
    });
  });
  return yeni;
}

window.generateBedenRange = async function(pid){
  const p = products.find(x=>x.id===pid); if(!p) return;
  const start = document.getElementById('br-start-'+pid).value;
  const end = document.getElementById('br-end-'+pid).value;
  const si = BEDEN_ORDER.indexOf(start), ei = BEDEN_ORDER.indexOf(end);
  if(si<0||ei<0||si>ei){ alert('Geçerli bir beden aralığı seç.'); return; }
  const range = BEDEN_ORDER.slice(si, ei+1);
  const yeni = buildMissingSizeVariants(p, range);
  if(!yeni.length){ alert('Bu aralıkta eklenecek yeni varyant yok (hepsi zaten mevcut).'); return; }
  p.variants = [...(p.variants||[]), ...yeni];
  await saveProduct(p);
};

window.generateBedenList = async function(pid){
  const p = products.find(x=>x.id===pid); if(!p) return;
  const raw = document.getElementById('br-list-'+pid).value;
  const sizes = raw.split(',').map(s=>s.trim()).filter(Boolean);
  if(!sizes.length){ alert('En az bir beden değeri gir (örn. 36,38,40).'); return; }
  const yeni = buildMissingSizeVariants(p, sizes);
  if(!yeni.length){ alert('Girilen bedenler için eklenecek yeni varyant yok (hepsi zaten mevcut).'); return; }
  p.variants = [...(p.variants||[]), ...yeni];
  await saveProduct(p);
  document.getElementById('br-list-'+pid).value='';
};

// Bir ürünün beden ölçülerinden İKAS'ın Html:Beden Rehberi özel alanına uygun HTML üretir.
// Ölçü yoksa null döner.
function buildBedenRehberiHtml(p){
  const vars = p.variants||[];
  const bedenMap = {};
  vars.forEach(v=>{
    const b = v.beden||'36';
    if(!bedenMap[b]) bedenMap[b] = {gogus:v.gogus||0, bel:v.bel||0, basen:v.basen||0};
  });
  const bedenRows = BEDEN_ORDER.filter(b=>bedenMap[b]).concat(Object.keys(bedenMap).filter(b=>!BEDEN_ORDER.includes(b)));
  if(!bedenRows.length) return null;
  return `<table>\n  <tbody>\n    <tr>\n      <th>Beden</th>\n      <th>Göğüs</th>\n      <th>Bel</th>\n      <th>Basen</th>\n    </tr>\n${bedenRows.map(b=>{
    const bm = bedenMap[b];
    return `    <tr data-size="${b}"><td>${b}</td><td>${bm.gogus||'-'}</td><td>${bm.bel||'-'}</td><td>${bm.basen||'-'}</td></tr>`;
  }).join('\n')}\n  </tbody>\n</table>`;
}

window.copyIkasHtml = function(pid){
  const p = products.find(x=>x.id===pid); if(!p) return;
  const html = buildBedenRehberiHtml(p);
  if(!html){ alert('Bu üründe henüz beden ölçüsü yok.'); return; }
  navigator.clipboard.writeText(html).then(()=>alert('İKAS beden rehberi HTML\'i panoya kopyalandı.')).catch(()=>alert('Kopyalanamadı, tarayıcı izni gerekebilir.'));
};

// ── Toplu Excel'e Aktar (İKAS "Ürün Özel Alanları" formatı — ürün başına tek satır) ──
// excel-sablon/ikas-urun-ozel-alanlar (4).csv ile birebir aynı 5 sütun ve CSV biçimi.
// Çoklu Seçim:Elbise Modeli / Kumaş Tipi bu uygulamada artık tutulmadığı için boş bırakılıyor
// (İKAS'ın kendi örnek dosyasında da bu alanlar çoğu zaman boştur).
window.exportBedenExcel = function(){
  if(!selected.size){ alert('Önce dışa aktarmak istediğin ürünleri işaretle (kutucuklardan seç).'); return; }
  const secilenUrunler = products.filter(p=>selected.has(p.id));

  // Henüz İKAS'ta eşleşmemiş (gerçek Ürün Grup ID'si olmayan) bir ürünün beden rehberini göndermenin
  // anlamı yok — İKAS'ta öyle bir ürün henüz yok, geçici ID hiçbir şeye eklenmez. Kullanıcıyı uyar.
  const eslesmemisSecili = secilenUrunler.filter(p=>!p.ikasGrupId);
  if(eslesmemisSecili.length){
    const devamEt = confirm(`Seçtiğin ${eslesmemisSecili.length} ürün henüz İKAS'ta eşleşmemiş (gerçek Ürün Grup ID'si yok) — bu ürünlerin beden rehberi İKAS'a doğru şekilde eklenmez. Önce "İKAS Excel" ile yükleyip "İKAS ID Eşitle" yapman gerekir.\n\nYine de geçici ID ile devam etmek istiyor musun?`);
    if(!devamEt) return;
  }

  const rows = [];
  secilenUrunler.forEach(p=>{
    const html = buildBedenRehberiHtml(p);
    if(!html) return; // ölçüsü olmayan ürünü atla
    // index.html'deki İKAS Excel export'uyla aynı mantık: Ürün Grup ID boşsa (henüz İKAS'a
    // yüklenmemiş/senkronlanmamış ürün) kendi ID'mizi geçici grup anahtarı olarak kullan —
    // aksi halde iki farklı export aynı ürün için farklı/boş Grup ID gönderir, tutarsızlık çıkar.
    rows.push([p.ikasGrupId||p.id, p.ad||'', html, '', '']);
  });
  if(!rows.length){ alert('Seçilen ürünlerde beden ölçüsü bulunamadı.'); return; }
  const headers = ['Ürün Grup ID','İsim','Html:Beden Rehberi','Çoklu Seçim:Elbise Modeli','Çoklu Seçim:Kumaş Tipi'];
  const csvCell = val => `"${String(val==null?'':val).replace(/"/g,'""')}"`;
  const lines = [headers, ...rows].map(r=>r.map(csvCell).join(','));
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+lines.join('\r\n')], {type:'text/csv;charset=utf-8'}));
  a.download = 'ikas_urun_ozel_alanlari_beden.csv';
  a.click();
};

function render(){
  const focusSnap=captureFocus();
  const q=search.toLowerCase();
  const filtered=q?products.filter(p=>(p.kod||'').toLowerCase().includes(q)||(p.ad||'').toLowerCase().includes(q)):products;

  const eslesmisUrunler = filtered.filter(p=>p.ikasGrupId);
  const yeniUrunler = filtered.filter(p=>!p.ikasGrupId);
  if(productTab!=='eslesmis' && productTab!=='yeni') productTab='eslesmis';
  const activeList = productTab==='eslesmis' ? eslesmisUrunler : yeniUrunler;

  document.getElementById('export-beden-btn-label').textContent = selected.size ? `Seçilenleri Dışa Aktar (${selected.size})` : 'Seçilenleri Dışa Aktar';
  document.getElementById('beden-selected-count').textContent = selected.size ? `${selected.size} ürün seçili` : '';

  document.getElementById('urun-tabs').innerHTML = `
    <button class="urun-tab ${productTab==='eslesmis'?'active':''}" onclick="setUrunTab('eslesmis')">Aktif — İKAS'ta Eşleşmiş <span class="tab-count">${eslesmisUrunler.length}</span></button>
    <button class="urun-tab ${productTab==='yeni'?'active':''}" onclick="setUrunTab('yeni')">Yeni Girilen <span class="tab-count">${yeniUrunler.length}</span></button>`;

  if(!activeList.length){
    document.getElementById('content').innerHTML='<div class="empty">Sonuç bulunamadı</div>';
    return;
  }

  function buildBlocks(list){
   return list.map(p=>{
    const vars=p.variants||[];
    // Bedene göre grupla
    const bedenMap={};
    vars.forEach(v=>{
      const b=v.beden||'36';
      if(!bedenMap[b]) bedenMap[b]={gogus:v.gogus||0,bel:v.bel||0,basen:v.basen||0,renkler:[]};
      bedenMap[b].renkler.push(v.renk||'Siyah');
    });
    const bedenRows=BEDEN_ORDER.filter(b=>bedenMap[b]).concat(Object.keys(bedenMap).filter(b=>!BEDEN_ORDER.includes(b)));

    if(!bedenRows.length) return '';

    return `<div class="product-block ${selected.has(p.id)?'selected':''}">
      <div class="product-header">
        <input type="checkbox" ${selected.has(p.id)?'checked':''} onchange="toggleProductSelect('${p.id}')" style="width:16px;height:16px;cursor:pointer;accent-color:var(--accent)">
        <span class="sku">${esc(p.kod)}</span>
        <span class="ad">${esc(p.ad||'—')}</span>
        <button class="btn" style="height:26px;font-size:10px" onclick="copyIkasHtml('${p.id}')">İKAS HTML Kopyala</button>
      </div>
      <div style="display:flex;align-items:center;gap:6px;padding:8px 16px;border-bottom:1px solid var(--border);font-size:12px;flex-wrap:wrap">
        <label style="color:var(--text-sec)">Beden aralığı ekle:</label>
        <select id="br-start-${p.id}" style="height:26px;border:1px solid var(--input-border);border-radius:5px;background:var(--surface2);color:var(--text)">${BEDEN_ORDER.map(b=>`<option>${b}</option>`).join('')}</select>
        <span>–</span>
        <select id="br-end-${p.id}" style="height:26px;border:1px solid var(--input-border);border-radius:5px;background:var(--surface2);color:var(--text)">${BEDEN_ORDER.map(b=>`<option${b===BEDEN_ORDER[BEDEN_ORDER.length-1]?' selected':''}>${b}</option>`).join('')}</select>
        <button class="btn" style="height:26px;font-size:10px" onclick="generateBedenRange('${p.id}')">Oluştur</button>
        <span style="width:1px;height:16px;background:var(--border-strong)"></span>
        <label style="color:var(--text-sec)">veya değer gir:</label>
        <input type="text" id="br-list-${p.id}" placeholder="36,38,40,44" style="width:110px;height:26px;padding:0 8px;border:1px solid var(--input-border);border-radius:5px;background:var(--surface2);color:var(--text);font-size:11px">
        <button class="btn" style="height:26px;font-size:10px" onclick="generateBedenList('${p.id}')">Girilenleri Oluştur</button>
      </div>
      <table class="beden-table">
        <thead><tr>
          <th style="width:80px">Beden</th>
          <th>Renkler</th>
          <th class="r">Göğüs (cm)</th>
          <th class="r">Bel (cm)</th>
          <th class="r">Basen (cm)</th>
        </tr></thead>
        <tbody>
          ${bedenRows.map(b=>{
            const bm=bedenMap[b];
            const renkDots=bm.renkler.map(r=>`<span class="color-dot" style="background:${CMAP[r]||'#aaa'}" title="${r}"></span>`).join('');
            return `<tr>
              <td><span class="beden-num">${b}</span></td>
              <td><div class="renk-wrap">${renkDots}</div></td>
              <td class="r"><input type="number" data-field="gogus" data-pid="${p.id}" data-beden="${b}" value="${bm.gogus||''}" min="0" placeholder="—"
                onchange="updBedenOlcu('${p.id}','${b}','gogus',this.value)"></td>
              <td class="r"><input type="number" data-field="bel" data-pid="${p.id}" data-beden="${b}" value="${bm.bel||''}" min="0" placeholder="—"
                onchange="updBedenOlcu('${p.id}','${b}','bel',this.value)"></td>
              <td class="r"><input type="number" data-field="basen" data-pid="${p.id}" data-beden="${b}" value="${bm.basen||''}" min="0" placeholder="—"
                onchange="updBedenOlcu('${p.id}','${b}','basen',this.value)"></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
   }).join('');
  }

  document.getElementById('content').innerHTML = buildBlocks(activeList);
  restoreFocus(focusSnap);
}
window.setUrunTab = function(tab){ productTab = tab; render(); };

window.toggleProductSelect = function(id){
  selected.has(id) ? selected.delete(id) : selected.add(id);
  render();
};
window.selectAllVisible = function(){
  const q=search.toLowerCase();
  const filtered=q?products.filter(p=>(p.kod||'').toLowerCase().includes(q)||(p.ad||'').toLowerCase().includes(q)):products;
  filtered.filter(p=>productTab==='eslesmis'?p.ikasGrupId:!p.ikasGrupId).forEach(p=>selected.add(p.id));
  render();
};
window.deselectAllProducts = function(){ selected.clear(); render(); };
</script>
</body>
</html>
