<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barkodlar — Abiye Stok</title>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8f7f5; --surface: #ffffff; --surface2: #f1efe9;
      --border: #e0ddd6; --border-strong: #c8c4bc;
      --text: #1a1a18; --text-sec: #6b6860; --text-muted: #9e9b94;
      --accent: #4f6ef7; --accent-bg: #eef1fe; --accent-text: #2d49c4;
      --success-bg: #eaf3de; --success-text: #3b6d11;
      --input-border: #8b5cf6; --input-border-focus: #ffffff;
      --radius: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #181816; --surface: #242422; --surface2: #2e2e2b;
        --border: #3a3a36; --border-strong: #4e4e4a;
        --text: #f0ede6; --text-sec: #a09d96; --text-muted: #6b6860;
        --accent: #6b87ff; --accent-bg: #1a2040; --accent-text: #a0b0ff;
      }
    }
    :root[data-theme="light"] {
      --bg: #f8f7f5; --surface: #ffffff; --surface2: #f1efe9;
      --border: #e0ddd6; --border-strong: #c8c4bc;
      --text: #1a1a18; --text-sec: #6b6860; --text-muted: #9e9b94;
      --accent: #4f6ef7; --accent-bg: #eef1fe; --accent-text: #2d49c4;
    }
    :root[data-theme="dark"] {
      --bg: #181816; --surface: #242422; --surface2: #2e2e2b;
      --border: #3a3a36; --border-strong: #4e4e4a;
      --text: #f0ede6; --text-sec: #a09d96; --text-muted: #6b6860;
      --accent: #6b87ff; --accent-bg: #1a2040; --accent-text: #a0b0ff;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; }

    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 8px 16px; min-height: 56px; display: flex; flex-wrap: wrap; align-items: center; gap: 8px 12px;
      position: sticky; top: 0; z-index: 10;
    }
    header h1 { font-size: 16px; font-weight: 600; flex: 1 1 auto; min-width: 100px; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--text-sec); text-decoration: none; font-size: 13px;
      padding: 6px 10px; border-radius: var(--radius); border: 1px solid var(--border);
      background: var(--surface); transition: background .15s;
    }
    .back-btn:hover { background: var(--surface2); }

    .container { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }

    .toolbar {
      display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap: wrap;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px 14px;
    }
    .toolbar label { font-size: 13px; color: var(--text-sec); font-weight: 500; }
    .toolbar select, .toolbar input[type=number] {
      height: 34px; padding: 0 10px; border: 1px solid var(--input-border); border-radius: var(--radius);
      background: var(--surface2); color: var(--text); font-size: 13px;
    }
    .toolbar select:focus, .toolbar input[type=number]:focus, .toolbar input[type=text]:focus { outline: none; border-color: var(--input-border-focus); }
    .toolbar input[type=number] { width: 70px; }
    .btn {
      height: 36px; padding: 0 14px; border: 1px solid var(--border-strong);
      border-radius: var(--radius); background: var(--surface); color: var(--text);
      font-size: 13px; font-weight: 500; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
    }
    .btn:hover { background: var(--surface2); }
    .btn.primary { background: var(--accent); color: #fff; border-color: transparent; }
    .btn.primary:hover { opacity: .9; }
    .sep { flex: 1; }

    .select-all-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 13px; color: var(--text-sec); }
    .select-all-wrap input { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); }

    .product-group { margin-bottom: 22px; }
    .product-group-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
      padding-bottom: 6px; border-bottom: 1px solid var(--border);
    }
    .product-group-header .pg-ad { font-family: monospace; font-size: 14px; font-weight: 600; color: var(--text); }
    .product-group-header .pg-count { font-size: 12px; color: var(--text-muted); }
    .product-group-header .pg-select-btn { margin-left: auto; height: 28px; padding: 0 10px; font-size: 12px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }

    .barcode-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 10px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
      position: relative;
    }
    .barcode-card:hover { border-color: var(--accent); }
    .barcode-card.selected { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
    .barcode-card input[type=checkbox] {
      position: absolute; top: 8px; right: 8px;
      width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent);
    }
    .barcode-card svg, .barcode-card canvas, .barcode-card img { width: 100%; max-width: 150px; height: auto; }
    .barcode-card .bc-kod { font-family: monospace; font-size: 11px; font-weight: 600; color: var(--text); }
    .barcode-card .bc-meta { font-size: 11px; color: var(--text-muted); }

    .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty p { margin-top: 12px; font-size: 14px; }

    .loading { text-align: center; padding: 60px; color: var(--text-muted); font-size: 14px; }

    /* Print styles */
    @media print {
      body { background: white; }
      header, .toolbar, .select-all-wrap, .btn, .back-btn, input[type=checkbox] { display: none !important; }
      .container { padding: 0; max-width: 100%; }
      .grid { grid-template-columns: repeat(4, 1fr); gap: 4px; }
      .barcode-card { border: 1px solid #ddd; border-radius: 4px; padding: 8px; break-inside: avoid; box-shadow: none !important; }
      .barcode-card:not(.selected) { display: none; }
      .barcode-card.print-all { display: flex !important; }
    }

    /* ── Zebra ZD220 etiket yazdırma (50x30mm, tek etiket/sayfa) ── */
    #zebra-print-area { display: none; }
    .zlabel {
      width: 50mm; height: 30mm; box-sizing: border-box; padding: 1.5mm 2mm;
      display: flex; flex-direction: row; align-items: center; gap: 2mm;
    }
    .zlabel .zqr { flex: 0 0 auto; width: 20mm; height: 20mm; }
    .zlabel .zqr svg, .zlabel .zqr canvas, .zlabel .zqr img { width: 100%; height: 100%; display: block; }
    .zlabel .zinfo { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; gap: 0.6mm; }
    .zlabel .zsku { font-family: monospace; font-size: 9pt; font-weight: 700; color: #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .zlabel .zvar { font-size: 8pt; color: #000; }
    .zlabel .zfiyat { font-size: 11pt; font-weight: 700; color: #000; }
    .zlabel .zkdv { font-size: 7pt; color: #333; }
    @media print {
      body.zebra-mode > *:not(#zebra-print-area) { display: none !important; }
      body.zebra-mode #zebra-print-area { display: block; }
      body.zebra-mode .zlabel { page-break-after: always; }
      body.zebra-mode .zlabel:last-child { page-break-after: auto; }
    }
  </style>
  <script>
  (function(){
    var saved = localStorage.getItem('theme');
    if (saved === 'light' || saved === 'dark') document.documentElement.setAttribute('data-theme', saved);
    window.toggleTheme = function(){
      var current = document.documentElement.getAttribute('data-theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeIcon();
    };
    window.updateThemeIcon = function(){
      var icon = document.getElementById('theme-icon');
      if (!icon) return;
      var current = document.documentElement.getAttribute('data-theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      icon.innerHTML = current === 'dark'
        ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
        : '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
    };
    document.addEventListener('DOMContentLoaded', updateThemeIcon);
  })();
  </script>
</head>
<body>

<header>
  <a href="/" class="back-btn">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Stok listesine dön
  </a>
  <h1>Barkodlar</h1>
  <a href="beden.html" class="back-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 9l10-7 10 7v11a2 2 0 01-2 2H4a2 2 0 01-2-2z"/><polyline points="7 22 7 12 17 12 17 22"/></svg>
    Beden Tablosu
  </a>
  <a href="tedarikci.html" class="back-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
    Tedarikçiler
  </a>
  <span id="selected-count" style="font-size:12px;color:var(--text-muted)"></span>
  <button class="back-btn" id="theme-toggle" style="width:30px;justify-content:center;padding:6px" onclick="toggleTheme()" title="Görünüm modu (açık/koyu)">
    <svg id="theme-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"></svg>
  </button>
</header>

<div class="container">
  <div class="toolbar">
    <input type="text" id="bc-search" placeholder="SKU, ürün adı veya renk ara..." style="height:34px;padding:0 10px;border:1px solid var(--input-border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:13px;min-width:180px;flex:1" oninput="regenerate()">
    <span id="bc-result-count" style="font-size:12px;color:var(--text-muted);white-space:nowrap"></span>
    <label>Tedarikçi:</label>
    <select id="bc-tedarikci" onchange="regenerate()"><option value="">Tümü</option></select>
    <label>Barkod türü:</label>
    <select id="bc-format" onchange="regenerate()">
      <option value="QR" selected>QR Kod (önerilen — telefonla okutmak için)</option>
      <option value="CODE128">Code 128</option>
      <option value="EAN13">EAN-13</option>
      <option value="CODE39">Code 39</option>
    </select>
    <label>Yükseklik:</label>
    <input type="number" id="bc-height" value="60" min="30" max="120" onchange="regenerate()">
    <div class="sep"></div>
    <button class="btn" onclick="selectAll()" title="Aramaya/filtreye uyan tüm barkodları seçer">Listelenenleri Seç</button>
    <button class="btn" onclick="deselectAll()">Seçimi kaldır</button>
    <button class="btn primary" onclick="printSelected()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Seçilenleri yazdır
    </button>
    <button class="btn" onclick="printZebraLabels()" title="Zebra ZD220 için 50x30mm, tek etiket/sayfa">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="7" width="18" height="10" rx="1"/><line x1="7" y1="7" x2="7" y2="17"/><line x1="11" y1="7" x2="11" y2="17"/><line x1="15" y1="7" x2="15" y2="17"/></svg>
      Zebra Etiket Yazdır
    </button>
    <label style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);font-weight:500;cursor:pointer;white-space:nowrap">
      <input type="checkbox" id="zebra-force-size" style="width:14px;height:14px;cursor:pointer;accent-color:var(--accent)" onchange="saveZebraForceSize(this.checked)">
      Sayfa boyutunu zorla (50x30mm)
    </label>
  </div>

  <div id="content"><div class="loading">Barkodlar yükleniyor...</div></div>
</div>

<div id="zebra-print-area"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

let products = [];
let rows = [];
let selected = new Set();

const DEMO = [
  {id:'1',kod:'ABY-001',ad:'Çiçekli Abiye',tedarikci:'ALFABETA',variants:[{id:'v1',sku:'ABY-001-V1',renk:'Ekru',beden:'36'},{id:'v2',sku:'ABY-001-V2',renk:'Bordo',beden:'38'}]},
  {id:'2',kod:'ABY-002',ad:'Straplez Mini',tedarikci:'MY DREAMS',variants:[{id:'v3',sku:'ABY-002-V1',renk:'Pudra',beden:'34'}]},
];

// Her ürünün varyantlarını (SKU bazlı) ayrı barkod satırlarına aç
function flattenRows(list){
  const out = [];
  list.forEach(p => {
    const vars = p.variants || [];
    if (!vars.length) {
      out.push({ id:p.id, pid:p.id, urunAdi:p.ad||'', anaKod:p.kod||p.id, kod:p.kod||p.id, ad:p.ad||'', renk:'', beden:'', tedarikci:p.tedarikci||'', barkodDegeri: p.kod||p.id, satis:p.satis||0, kdvOrani:p.kdvOrani||0 });
      return;
    }
    vars.forEach(v => {
      out.push({
        id: p.id + '_' + v.id,
        pid: p.id,
        urunAdi: p.ad || '',
        anaKod: p.kod || p.id,
        kod: v.sku || p.kod || p.id,
        ad: p.ad || '',
        renk: v.renk || '',
        beden: v.beden || '',
        tedarikci: p.tedarikci || '',
        barkodDegeri: v.barkod || v.sku || p.kod || p.id,
        satis: p.satis || 0,
        kdvOrani: p.kdvOrani || 0,
      });
    });
  });
  return out;
}

function getConfig() {
  try { return JSON.parse(localStorage.getItem('firebase_cfg') || 'null'); } catch { return null; }
}

window.saveZebraForceSize = function(checked) {
  localStorage.setItem('zebraForceSize', checked ? 'true' : 'false');
};

function init() {
  document.getElementById('zebra-force-size').checked = localStorage.getItem('zebraForceSize') !== 'false';
  const cfg = {
    apiKey: "AIzaSyBED4SOH13mpdpuGLHwG_wl6lhe1a4YNos",
    authDomain: "stok-19117.firebaseapp.com",
    projectId: "stok-19117",
    storageBucket: "stok-19117.firebasestorage.app",
    messagingSenderId: "599549832875",
    appId: "1:599549832875:web:4570ade50e2731469091ee"
  };
  if (cfg) {
    try {
      const app = initializeApp(cfg, 'barkod-' + Date.now());
      const db = getFirestore(app);
      onSnapshot(collection(db, 'stok'), snap => {
        products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        products.sort((a,b) => (a.sira||0)-(b.sira||0));
        populateTedarikciFilter();
        render();
      }, () => { products = DEMO; populateTedarikciFilter(); render(); });
    } catch(e) { products = DEMO; populateTedarikciFilter(); render(); }
  } else {
    products = DEMO; populateTedarikciFilter(); render();
  }
}

function populateTedarikciFilter(){
  const sel = document.getElementById('bc-tedarikci');
  const current = sel.value;
  const set = new Set(products.map(p => (p.tedarikci||'').trim()).filter(Boolean));
  sel.innerHTML = '<option value="">Tümü</option>' + [...set].sort().map(t => `<option${t===current?' selected':''}>${esc(t)}</option>`).join('');
}

function render() {
  const q = (document.getElementById('bc-search').value||'').toLowerCase();
  const ted = document.getElementById('bc-tedarikci').value;
  let flat = flattenRows(products);
  if (ted) flat = flat.filter(r => (r.tedarikci||'')===ted);
  if (q) flat = flat.filter(r =>
    (r.kod||'').toLowerCase().includes(q) ||
    (r.ad||'').toLowerCase().includes(q) ||
    (r.renk||'').toLowerCase().includes(q) ||
    (r.tedarikci||'').toLowerCase().includes(q)
  );
  rows = flat;
  document.getElementById('bc-result-count').textContent = `${rows.length} barkod listelendi`;

  if (!rows.length) {
    document.getElementById('content').innerHTML = '<div class="empty"><p>Sonuç bulunamadı.</p></div>';
    updateCount();
    return;
  }

  const fmt = document.getElementById('bc-format').value;
  const h = parseInt(document.getElementById('bc-height').value) || 60;

  // Ürüne göre grupla (varyantlar ana ürünün altında listelensin)
  const groups = [];
  const groupByPid = new Map();
  rows.forEach(r => {
    let g = groupByPid.get(r.pid);
    if (!g) { g = { pid: r.pid, kod: r.anaKod, items: [] }; groupByPid.set(r.pid, g); groups.push(g); }
    g.items.push(r);
  });

  document.getElementById('content').innerHTML = groups.map(g => `
    <div class="product-group">
      <div class="product-group-header">
        <span class="pg-ad">${esc(g.kod || '—')}</span>
        <span class="pg-count">${g.items.length} varyant</span>
        <button class="btn ghost pg-select-btn" onclick="selectGroup('${g.pid}')">Bu ürünü seç</button>
      </div>
      <div class="grid">
        ${g.items.map(r => `
          <div class="barcode-card ${selected.has(r.id)?'selected':''}" id="card-${r.id}" onclick="toggleCard('${r.id}')">
            <input type="checkbox" ${selected.has(r.id)?'checked':''} onclick="event.stopPropagation()" onchange="toggleCard('${r.id}')">
            <span class="bc-code" id="bc-${r.id}"></span>
            <span class="bc-kod">${esc(r.kod||r.id)}</span>
            <span class="bc-meta">${esc(r.renk||'')}${r.renk&&r.beden?' · ':''}${esc(r.beden||'')}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');

  rows.forEach(r => {
    const el = document.getElementById('bc-' + r.id);
    if (!el) return;
    const barkodDegeri = r.barkodDegeri || r.kod || r.id;
    el.innerHTML = '';
    if (fmt === 'QR') {
      try { new QRCode(el, { text: barkodDegeri, width: h, height: h }); }
      catch (e) { el.parentElement.style.opacity = '.4'; }
    } else {
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      el.appendChild(svg);
      try {
        JsBarcode(svg, barkodDegeri, {
          format: fmt,
          height: h,
          fontSize: 11,
          margin: 4,
          lineColor: '#1a1a18',
          background: 'transparent',
          displayValue: false,
        });
      } catch(e) {
        // fallback to CODE128 if format incompatible
        try {
          JsBarcode(svg, barkodDegeri, { format: 'CODE128', height: h, fontSize: 11, margin: 4, lineColor: '#1a1a18', background: 'transparent', displayValue: false });
        } catch(e2) { el.parentElement.style.opacity = '.4'; }
      }
    }
  });

  updateCount();
}

window.selectGroup = function(pid) {
  rows.filter(r => r.pid === pid).forEach(r => {
    selected.add(r.id);
    const c = document.getElementById('card-' + r.id);
    if (c) { c.classList.add('selected'); const cb = c.querySelector('input'); if (cb) cb.checked = true; }
  });
  updateCount();
};

window.toggleCard = function(id) {
  if (selected.has(id)) selected.delete(id);
  else selected.add(id);
  const card = document.getElementById('card-' + id);
  if (card) {
    card.classList.toggle('selected', selected.has(id));
    const cb = card.querySelector('input[type=checkbox]');
    if (cb) cb.checked = selected.has(id);
  }
  updateCount();
};

window.selectAll = function() {
  rows.forEach(r => { selected.add(r.id); const c = document.getElementById('card-'+r.id); if(c){c.classList.add('selected');const cb=c.querySelector('input');if(cb)cb.checked=true;} });
  updateCount();
};

window.deselectAll = function() {
  selected.clear();
  document.querySelectorAll('.barcode-card').forEach(c => { c.classList.remove('selected'); const cb=c.querySelector('input');if(cb)cb.checked=false; });
  updateCount();
};

window.regenerate = function() { render(); };

window.printSelected = function() {
  if (!selected.size) { alert('Önce yazdırmak istediğin barkodları seç!'); return; }
  window.print();
};

// ── Zebra ZD220 etiket yazdırma (50x30mm, tek etiket/sayfa) ──────────
window.printZebraLabels = function() {
  if (!selected.size) { alert('Önce etiketi yazdırılacak ürünleri seç!'); return; }
  const fmt = document.getElementById('bc-format').value;
  const selectedRows = rows.filter(r => selected.has(r.id));
  const area = document.getElementById('zebra-print-area');
  area.innerHTML = selectedRows.map(r => {
    const fiyat = formatFiyat(r.satis);
    const kdv = r.kdvOrani > 0 ? `KDV %${r.kdvOrani}` : '';
    return `
    <div class="zlabel">
      <span class="zqr" id="zbc-${r.id}"></span>
      <div class="zinfo">
        <div class="zsku">${esc(simplifiedSku(r.kod))}</div>
        <div class="zvar">${esc(r.renk || '')}${r.renk && r.beden ? ' · ' : ''}${esc(r.beden || '')}</div>
        <div class="zfiyat">${esc(fiyat)}</div>
        ${kdv ? `<div class="zkdv">${esc(kdv)}</div>` : ''}
      </div>
    </div>`;
  }).join('');
  selectedRows.forEach(r => {
    const el = document.getElementById('zbc-' + r.id);
    const barkodDegeri = r.barkodDegeri || r.kod || r.id;
    if (fmt === 'QR') {
      try { new QRCode(el, { text: barkodDegeri, width: 200, height: 200 }); }
      catch (e) { el.style.opacity = '.4'; }
    } else {
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      el.appendChild(svg);
      try {
        JsBarcode(svg, barkodDegeri, { format: fmt, height: 50, fontSize: 11, margin: 2, lineColor: '#000', background: 'transparent', displayValue: false });
      } catch (e) {
        try { JsBarcode(svg, barkodDegeri, { format: 'CODE128', height: 50, fontSize: 11, margin: 2, lineColor: '#000', background: 'transparent', displayValue: false }); }
        catch (e2) { el.parentElement.style.opacity = '.4'; }
      }
    }
  });
  if (document.getElementById('zebra-force-size').checked) {
    const pageStyle = document.createElement('style');
    pageStyle.id = 'zebra-page-style';
    pageStyle.textContent = '@page{size:50mm 30mm;margin:0}';
    document.head.appendChild(pageStyle);
  }
  document.body.classList.add('zebra-mode');
  window.addEventListener('afterprint', cleanupZebraPrint, { once: true });
  window.print();
  setTimeout(cleanupZebraPrint, 2000); // afterprint bazı tarayıcılarda tetiklenmeyebilir
};
function cleanupZebraPrint() {
  document.body.classList.remove('zebra-mode');
  const s = document.getElementById('zebra-page-style');
  if (s) s.remove();
}

function updateCount() {
  document.getElementById('selected-count').textContent = selected.size ? `${selected.size} barkod seçili` : '';
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// SKU'nun tam hali "Marka-Tedarikçi-ÜrünTipi-TedarikçiKodu-Uzunluk[-Renk-Beden]" şeklinde;
// etikette sadece Tedarikçi kısaltması + Tedarikçi kodu gösterilir (örn. "GC-SN-ELB-576-MN" -> "SN-576")
function simplifiedSku(kod) {
  const segs = String(kod || '').split('-');
  return segs.length >= 4 ? `${segs[1]}-${segs[3]}` : (kod || '');
}

function formatFiyat(n) { return n ? '₺' + Number(n).toLocaleString('tr-TR') : ''; }

init();
</script>
</body>
</html>
